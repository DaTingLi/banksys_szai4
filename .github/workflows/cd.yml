name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Fix git ownership issue
            git config --global --add safe.directory /opt/banksys

            mkdir -p /opt/banksys
            cd /opt/banksys

            # Check if directory is a git repository
            if [ -d .git ]; then
              echo ">> Existing git repository, pulling latest code"
              git pull
            else
              echo ">> Not a git repository, cloning fresh"
              rm -rf * .* 2>/dev/null || true
              git clone https://github.com/DaTingLi/banksys_szai4.git .
            fi

            # Fixed port for deployment
            PORT=8004

            # Stop ALL containers using ports 8004-8010
            echo ">> Cleaning up old containers..."
            for container in $(docker ps -q --filter "publish=8000-8010"); do
              echo ">> Stopping container $container"
              docker rm -f "$container" 2>/dev/null || true
            done

            # Also stop any container named banksys (might be stopped but not removed)
            docker rm -f banksys 2>/dev/null || true

            # Wait for ports to be released
            echo ">> Waiting for port $PORT to be released..."
            for i in $(seq 1 15); do
              if ! ss -ltnH 2>/dev/null | grep -q ":$PORT " && ! docker ps --format "{{.Ports}}" 2>/dev/null | grep -q ":$PORT->"; then
                echo ">> Port $PORT is free"
                break
              fi
              echo ">> Port $PORT still busy, waiting... ($i/15)"
              sleep 1
            done

            # Final check - if port still busy, abort
            if ss -ltnH 2>/dev/null | grep -q ":$PORT " || docker ps --format "{{.Ports}}" 2>/dev/null | grep -q ":$PORT->"; then
              echo "ERROR: Port $PORT is still in use after cleanup, aborting"
              echo ">> Please manually check what is using port $PORT"
              ss -ltnH | grep ":$PORT " || echo "No process found using port $PORT via ss"
              docker ps --format "table {{.Names}}\t{{.Ports}}" | grep "$PORT" || echo "No container found using port $PORT"
              exit 1
            fi

            echo ">> Deploying to fixed port $PORT"

            # Build image
            docker build --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple -t banksys:latest .

            # Run new container
            docker run -d --name banksys --restart unless-stopped -p ${PORT}:8501 banksys:latest

            # Wait for startup
            sleep 5

            # Health check
            curl -fsS "http://localhost:${PORT}/_stcore/health"
            echo ">> 部署成功: http://${{ secrets.SSH_HOST }}:${PORT}/"
